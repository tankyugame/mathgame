<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>無限スクロール算数ゲーム</title>
<style>
html, body {
  margin:0; padding:0;
  background:#000; height:100%;
  display:flex; justify-content:center; align-items:center;
  overflow:hidden;
}
canvas {
  background:#f5f5f5;
  display:block;
  touch-action:none;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* ===== 9:16リサイズ ===== */
function resizeCanvas() {
  const screenRatio = window.innerWidth / window.innerHeight;
  const targetRatio = 9 / 16;
  if (screenRatio > targetRatio) {
    canvas.height = window.innerHeight;
    canvas.width = canvas.height * targetRatio;
  } else {
    canvas.width = window.innerWidth;
    canvas.height = canvas.width / targetRatio;
  }
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

/* ===== 定数 ===== */
const cellSize = 100;
const objectSize = 28;

/* ===== 仮想ジョイスティック ===== */
let joystick = { active:false, baseX:0, baseY:0, stickX:0, stickY:0, radius:70 };

/* ===== 状態 ===== */
let player, score, targetValue, lastTarget;
let timeLeft, lastUpdateTime, gameOver;
let effects;
let allObjects = [];
let generatedCells = new Set();

/* ===== 初期化 ===== */
function initGame() {
  player = { x: 0, y: 0, size: 28, speed: 3.2, value: 1 };
  score = 0;
  lastTarget = null;
  targetValue = getRandomTargetValue();
  timeLeft = 60;
  lastUpdateTime = performance.now();
  gameOver = false;
  effects = [];
  allObjects = [];
  generatedCells.clear();
}
initGame();

/* ===== ジョイスティック操作 ===== */
canvas.addEventListener("touchstart", e=>{
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  joystick.active = true;
  joystick.baseX = t.clientX - rect.left;
  joystick.baseY = t.clientY - rect.top;
  joystick.stickX = joystick.baseX;
  joystick.stickY = joystick.baseY;
});

canvas.addEventListener("touchmove", e=>{
  if(!joystick.active) return;
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  let x = t.clientX - rect.left;
  let y = t.clientY - rect.top;
  const dx = x - joystick.baseX;
  const dy = y - joystick.baseY;
  const dist = Math.hypot(dx,dy);
  if(dist > joystick.radius) {
    const angle = Math.atan2(dy,dx);
    x = joystick.baseX + Math.cos(angle) * joystick.radius;
    y = joystick.baseY + Math.sin(angle) * joystick.radius;
  }
  joystick.stickX = x;
  joystick.stickY = y;
});

canvas.addEventListener("touchend", ()=>{ joystick.active=false; });
canvas.addEventListener("click", ()=>{ if(gameOver) initGame(); });

/* ===== 数学オブジェクト ===== */
function randomNumberForObject() { return Math.random() < 0.6 ? Math.floor(Math.random()*5)+1 : Math.floor(Math.random()*5)+6; }
function randomOperation() {
  const r = Math.random();
  let op,num;
  if(r<0.4){ op="+"; num=randomNumberForObject();}
  else if(r<0.8){ op="-"; num=randomNumberForObject();}
  else if(r<0.9){ op="*"; num=Math.floor(Math.random()*4)+2;}
  else{ op="/"; num=Math.floor(Math.random()*4)+2;}
  return {text:op+num, op, num};
}
function getRandomTargetValue(){
  let v; do{ v=Math.floor(Math.random()*40)+1; }while(v===lastTarget);
  lastTarget=v; return v;
}

/* ===== 更新 ===== */
function update(){
  if(gameOver) return;
  const now = performance.now();
  const dt = (now-lastUpdateTime)/1000;
  lastUpdateTime=now;

  timeLeft-=dt;
  if(timeLeft<=0){ timeLeft=0; gameOver=true; return; }

  if(joystick.active){
    const dx = joystick.stickX - joystick.baseX;
    const dy = joystick.stickY - joystick.baseY;
    const dist = Math.hypot(dx,dy);
    if(dist>5){
      const power = Math.min(dist/joystick.radius,1);
      const nx=dx/dist; const ny=dy/dist;
      const speedFactor=1.1;
      player.x += nx*player.speed*power*speedFactor;
      player.y += ny*player.speed*power*speedFactor;
    }
  }

  effects.forEach(e=>{ e.alpha-=0.02; e.size+=3; });
  effects = effects.filter(e=>e.alpha>0);
}

/* ===== 背景グリッド ===== */
function drawBackground(cx,cy){
  ctx.fillStyle="#f5f5f5"; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle="#ddd"; ctx.lineWidth=1;
  for(let x=-cx%cellSize;x<canvas.width;x+=cellSize){
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
  }
  for(let y=-cy%cellSize;y<canvas.height;y+=cellSize){
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
  }
}

/* ===== 数字玉生成 ===== */
function generateObjects(cx,cy){
  const sx = Math.floor(cx / cellSize)-1;
  const sy = Math.floor(cy / cellSize)-1;
  const ex = Math.floor((cx+canvas.width)/cellSize)+1;
  const ey = Math.floor((cy+canvas.height)/cellSize)+1;

  const minDistance = player.size*2; // プレイヤー直径*2以上

  for(let x=sx;x<=ex;x++){
    for(let y=sy;y<=ey;y++){
      const key = `${x},${y}`;
      if(generatedCells.has(key)) continue;

      if(Math.random()<0.3){
        let attempts=0;
        let placed=false;
        while(!placed && attempts<50){
          attempts++;
          const ox = x*cellSize + Math.random()*cellSize;
          const oy = y*cellSize + Math.random()*cellSize;

          let tooClose=false;
          for(const o of allObjects){
            if(Math.hypot(o.x-ox,o.y-oy)<minDistance){ tooClose=true; break; }
          }

          if(!tooClose){
            const obj = {x:ox,y:oy,size:objectSize,value:randomOperation()};
            allObjects.push(obj);
            placed=true;
          }
        }
      }
      generatedCells.add(key);
    }
  }
}

/* ===== 演算 ===== */
function applyOperation(o){
  const {op,num}=o.value;
  if(op==="+") player.value+=num;
  if(op==="-") player.value-=num;
  if(op==="*") player.value*=num;
  if(op==="/") player.value=Math.floor(player.value/num);
  player.value=Math.max(0,player.value);

  if(player.value===targetValue){
    score++;
    timeLeft+=5;
    effects.push({value:player.value,x:canvas.width/2,y:canvas.height/2,alpha:1,size:60});
    targetValue=getRandomTargetValue();
  }
}

/* ===== 描画 ===== */
function drawObjects(cx,cy){
  for(let i=allObjects.length-1;i>=0;i--){
    const o=allObjects[i];
    if(Math.hypot(o.x-player.x,o.y-player.y)<o.size+player.size){
      applyOperation(o);
      allObjects.splice(i,1);
      continue;
    }
    const x=o.x-cx, y=o.y-cy;
    ctx.fillStyle="blue"; ctx.beginPath(); ctx.arc(x,y,o.size,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="white"; ctx.font="bold 22px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(o.value.text,x,y);
  }
}

function drawPlayer(){
  const x=canvas.width/2,y=canvas.height/2;
  ctx.fillStyle="red"; ctx.beginPath(); ctx.arc(x,y,player.size,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="white"; ctx.font="bold 24px Arial"; ctx.fillText(player.value,x,y);
}

/* ===== UI描画（上下逆） ===== */
function drawScoreTime(){
  const w=220, h=70;
  const x = canvas.width/2 - w/2;
  const y = 10; // 画面上端にスコア・タイマー
  ctx.fillStyle="rgba(0,0,0,0.5)"; ctx.fillRect(x,y,w,h);
  ctx.fillStyle="white"; ctx.font="bold 20px Arial"; ctx.textAlign="center";
  ctx.fillText(`スコア: ${score}`,canvas.width/2,y+25);
  ctx.fillText(`残り時間: ${Math.ceil(timeLeft)}秒`,canvas.width/2,y+50);
}

function drawTarget(){
  ctx.fillStyle="rgba(255,215,0,0.25)";
  const w = 200, h=50;
  const x = canvas.width/2 - w/2;
  const y = 90; // スコアタイマーの下に目標値
  ctx.fillRect(x,y,w,h);
  ctx.strokeStyle="gold"; ctx.strokeRect(x,y,w,h);
  ctx.fillStyle="#ff9800"; ctx.font="bold 24px Arial"; ctx.textAlign="center";
  ctx.fillText(`目標 ${targetValue}`,canvas.width/2,y+h/2+2);
}

function drawJoystick(){
  if(!joystick.active) return;
  ctx.beginPath(); ctx.arc(joystick.baseX,joystick.baseY,joystick.radius,0,Math.PI*2); ctx.fillStyle="rgba(0,0,0,0.25)"; ctx.fill();
  ctx.beginPath(); ctx.arc(joystick.stickX,joystick.stickY,joystick.radius/2,0,Math.PI*2); ctx.fillStyle="rgba(0,0,0,0.5)"; ctx.fill();
}

function drawEffects(){
  effects.forEach(e=>{
    ctx.fillStyle=`rgba(255,215,0,${e.alpha})`;
    ctx.font=`bold ${e.size}px Arial`; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(e.value,e.x,e.y);
  });
}

function drawGameOver(){
  ctx.fillStyle="rgba(0,0,0,0.75)"; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white"; ctx.textAlign="center"; ctx.font="bold 40px Arial";
  ctx.fillText("ゲームオーバー",canvas.width/2,canvas.height/2-40);
  ctx.fillText(`スコア: ${score}`,canvas.width/2,canvas.height/2);
  ctx.font="bold 24px Arial"; ctx.fillText("タップでリスタート",canvas.width/2,canvas.height/2+60);
}

/* ===== 描画ループ ===== */
function draw(){
  const cx=player.x-canvas.width/2;
  const cy=player.y-canvas.height/2;
  drawBackground(cx,cy);
  generateObjects(cx,cy);
  drawObjects(cx,cy);
  drawPlayer();
  drawScoreTime(); // 上
  drawTarget();    // 下
  drawEffects();
  drawJoystick();
  if(gameOver) drawGameOver();
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>

</body>
</html>
