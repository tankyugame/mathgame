<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>無限スクロール算数ゲーム</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #eee;
  display: flex;
  justify-content: center;
  align-items: center;
}
canvas {
  background: #f5f5f5;
  display: block;
  cursor: pointer;
}
</style>
</head>
<body>

<canvas id="game" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* ===== 定数 ===== */
const cellSize = 100;
const objectSize = 28;
const objectMargin = 28;

/* ===== 状態 ===== */
let player, score, targetValue, lastTarget;
let timeLeft, lastUpdateTime, gameOver;
let effects;
const objectMap = new Map();

/* ===== 初期化 ===== */
function initGame() {
  player = { x: 0, y: 0, size: 28, speed: 4, value: 1 };
  score = 0;
  lastTarget = null;
  targetValue = getRandomTargetValue();
  timeLeft = 60;
  lastUpdateTime = performance.now();
  gameOver = false;
  effects = [];
  objectMap.clear();
}
initGame();

/* ===== 入力 ===== */
const keys = {};
addEventListener("keydown", e => keys[e.key] = true);
addEventListener("keyup", e => keys[e.key] = false);

/* リスタート */
canvas.addEventListener("click", e => {
  if (!gameOver) return;
  const r = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left;
  const my = e.clientY - r.top;
  const bx = canvas.width/2 - 120;
  const by = canvas.height/2 + 60;
  if (mx >= bx && mx <= bx+240 && my >= by && my <= by+60) {
    initGame();
  }
});

/* ===== 数学オブジェクト ===== */
function randomNumberForObject() {
  return Math.random() < 0.6
    ? Math.floor(Math.random() * 5) + 1
    : Math.floor(Math.random() * 5) + 6;
}

function randomOperation() {
  const r = Math.random();
  let op, num;
  if (r < 0.4) { op="+"; num=randomNumberForObject(); }
  else if (r < 0.8) { op="-"; num=randomNumberForObject(); }
  else if (r < 0.9) { op="*"; num=Math.floor(Math.random()*4)+2; }
  else { op="/"; num=Math.floor(Math.random()*4)+2; }
  return { text: op+num, op, num };
}

function getRandomTargetValue() {
  let v;
  do { v = Math.floor(Math.random()*40)+1; }
  while (v === lastTarget);
  lastTarget = v;
  return v;
}

/* ===== 更新 ===== */
function update() {
  if (gameOver) return;

  const now = performance.now();
  const dt = (now - lastUpdateTime) / 1000;
  lastUpdateTime = now;

  timeLeft -= dt;
  if (timeLeft <= 0) {
    timeLeft = 0;
    gameOver = true;
    return;
  }

  let dx=0, dy=0;
  if (keys["ArrowUp"]) dy--;
  if (keys["ArrowDown"]) dy++;
  if (keys["ArrowLeft"]) dx--;
  if (keys["ArrowRight"]) dx++;

  if (dx || dy) {
    const l = Math.hypot(dx,dy);
    player.x += dx/l * player.speed;
    player.y += dy/l * player.speed;
  }

  // 達成演出更新
  effects.forEach(e => {
    e.alpha -= 0.02;
    e.size += 3;
  });
  effects = effects.filter(e => e.alpha > 0);
}

/* ===== オブジェクト生成 ===== */
function isValidPosition(objs,x,y) {
  return !objs.some(o => Math.hypot(o.x-x,o.y-y) < objectSize*2+objectMargin);
}

function generateObjects(cx,cy) {
  const sx = Math.floor(cx/cellSize)-1;
  const sy = Math.floor(cy/cellSize)-1;
  const ex = Math.floor((cx+canvas.width)/cellSize)+1;
  const ey = Math.floor((cy+canvas.height)/cellSize)+1;

  for (let x=sx;x<=ex;x++) {
    for (let y=sy;y<=ey;y++) {
      const key=`${x},${y}`;
      if (!objectMap.has(key)) {
        const objs=[];
        if (Math.random()<0.3) {
          let ox,oy,t=0;
          do {
            ox=x*cellSize+Math.random()*cellSize;
            oy=y*cellSize+Math.random()*cellSize;
            t++;
          } while(!isValidPosition(objs,ox,oy)&&t<50);
          objs.push({x:ox,y:oy,size:objectSize,value:randomOperation()});
        }
        objectMap.set(key,objs);
      }
    }
  }
}

/* ===== 演算 ===== */
function applyOperation(o) {
  const {op,num}=o.value;
  if (op==="+") player.value+=num;
  if (op==="-") player.value-=num;
  if (op==="*") player.value*=num;
  if (op==="/") player.value=Math.floor(player.value/num);

  if (player.value===targetValue) {
    score++;
    timeLeft+=5; // ← ここを +5秒 に変更
    effects.push({
      value: player.value,
      x: canvas.width/2,
      y: canvas.height/2,
      alpha: 1,
      size: 60
    });
    targetValue=getRandomTargetValue();
  }
}

/* ===== 描画 ===== */
function drawBackground(cx,cy) {
  ctx.fillStyle="#f5f5f5";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle="#ccc";

  for (let x=-cx%cellSize;x<canvas.width;x+=cellSize) {
    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x,canvas.height);
    ctx.stroke();
  }
  for (let y=-cy%cellSize;y<canvas.height;y+=cellSize) {
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvas.width,y);
    ctx.stroke();
  }
}

function drawObjects(cx,cy) {
  generateObjects(cx,cy);
  objectMap.forEach(objs=>{
    for (let i=objs.length-1;i>=0;i--) {
      const o=objs[i];
      if (Math.hypot(o.x-player.x,o.y-player.y)<o.size+player.size) {
        applyOperation(o);
        objs.splice(i,1);
        continue;
      }
      const x=o.x-cx, y=o.y-cy;
      ctx.fillStyle="blue";
      ctx.beginPath();
      ctx.arc(x,y,o.size,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle="white";
      ctx.font="bold 26px Arial";
      ctx.textAlign="center";
      ctx.textBaseline="middle";
      ctx.fillText(o.value.text,x,y);
    }
  });
}

function drawPlayer() {
  const x=canvas.width/2, y=canvas.height/2;
  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(x,y,player.size,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle="white";
  ctx.font="bold 28px Arial";
  ctx.fillText(player.value,x,y);
}

function drawUI() {
  ctx.fillStyle="rgba(0,0,0,0.5)";
  ctx.fillRect(15,15,240,90);
  ctx.fillStyle="white";
  ctx.font="bold 26px Arial";
  ctx.textAlign="left";
  ctx.fillText(`スコア: ${score}`,25,50);
  ctx.fillText(`残り時間: ${Math.ceil(timeLeft)}秒`,25,85);
}

function drawTarget() {
  ctx.fillStyle="rgba(255,215,0,0.25)";
  ctx.fillRect(canvas.width/2-120,10,240,50);
  ctx.strokeStyle="gold";
  ctx.strokeRect(canvas.width/2-120,10,240,50);
  ctx.fillStyle="#ff9800";
  ctx.font="bold 28px Arial"; // ← 少し小さくした
  ctx.textAlign="center";
  ctx.fillText(`目標 ${targetValue}`,canvas.width/2,45);
}

/* ★ 達成演出 */
function drawEffects() {
  effects.forEach(e=>{
    ctx.fillStyle=`rgba(255,215,0,${e.alpha})`;
    ctx.font=`bold ${e.size}px Arial`;
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillText(e.value,e.x,e.y);
  });
}

function drawGameOver() {
  ctx.fillStyle="rgba(0,0,0,0.75)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  ctx.textAlign="center";
  ctx.font="bold 50px Arial";
  ctx.fillText("ゲームオーバー",canvas.width/2,canvas.height/2-80);
  ctx.font="bold 32px Arial";
  ctx.fillText(`スコア: ${score}`,canvas.width/2,canvas.height/2-20);
  ctx.fillStyle="#2196f3";
  ctx.fillRect(canvas.width/2-120,canvas.height/2+60,240,60);
  ctx.fillStyle="white";
  ctx.font="bold 28px Arial";
  ctx.fillText("リスタート",canvas.width/2,canvas.height/2+100);
}

function draw() {
  const cx=player.x-canvas.width/2;
  const cy=player.y-canvas.height/2;
  drawBackground(cx,cy);
  drawObjects(cx,cy);
  drawPlayer();
  drawUI();
  drawTarget();
  drawEffects(); // ← 達成演出
  if (gameOver) drawGameOver();
}

/* ===== ループ ===== */
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
